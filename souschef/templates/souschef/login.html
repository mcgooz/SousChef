{% extends "SousChef/layout.html" %}

{% block title %}
    Log in
{% endblock %}

{% block body %}
<div class="container bg-custom mt-2 p-4">
    <h4>Log in</h4>
    <div class="row">
        <div class="col-5">
            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="form-group shadow">
                    <input autofocus class="form-control" type="text" name="username" placeholder="Username">
                </div>

                <div class="form-group shadow my-2">
                    <input class="form-control" type="password" id="password" name="password" placeholder="Password">
                </div>
                
                <div class="form-check form-switch form-check-reverse my-2">
                    <input class="form-check-input" type="checkbox" role="switch" id="pwSwitch" onclick="togglePassword()">
                    <label class="form-check-label" for="pwSwitch">Show Password</label>
                </div>
                
                <input id="loginButton" class="btn btn-custom shadow" type="submit" value="Login">
            </form>
        </div>
        <div class="col">
            {% if message %}
                <div data-bs-theme="dark" class="alert card alert-dismissible fade show shadow mx-auto" role="alert">
                    {{ message }} <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}
        </div>
    </div>    

    <div class="my-3">Don't have an account? Register <a href="{% url 'register' %}">here.</a></div>
</div>
{% endblock %}
