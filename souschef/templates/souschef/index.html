{% extends "SousChef/layout.html" %}

{% block title %}
    {{ "Home" }}
{% endblock %}

{% block body %}

    <div class="row mt-2 mx-3 p-1">
        <h2> {{ date }}</h2>
        <div class="col">
            <h6>Welcome to your kitchen!</h6>
        </div>
    </div>
    
    <div class="row mt-2 mx-3 p-1">
        <div class="col">
            <form id="homeSearchForm" method="POST" action="recipe">
                {% csrf_token %}
                <input type="text" class="form-control" id="homeSearch" placeholder="Search for a recipe or ingredient...">
                <ul id="homeSuggestions" class="list-group homeSuggestions" style="width: auto;"></ul>
            </form>
        </div>
        <div class="col">
            <span id="searchResult">
        </div>
    </div> 
{% endblock %}
