{% extends "SousChef/layout.html" %}
{% load static %}

{% block body %}
    <div class="container text-center mt-5">
        <div class="row justify-content-center g-2">
            {% if recipes %}
                {% for recipe in recipes %}
                    <div class="col m-2 p-2">
                        <div class="card recipe-card shadow mx-auto" style="width: 18rem;">
                            {% if recipe.image %}
                                <a class="mt-3 mx-auto" href="{% url 'recipe' recipe.id %}">
                                <img src="{{ recipe.image.url }}" class="card-img-top img-fluid recipe-image-mid" alt="recipe image">
                                </a>
                            {% else %}
                                <a class="mt-3 mx-auto" href="{% url 'recipe' recipe.id %}">
                                <img src="{% static 'images/default_pics/default_recipe.png' %}" class="card-img-top img-fluid recipe-image-mid" alt="recipe image">
                                </a>
                            {% endif %}

                            <div class="card-body">
                                <h5 class="card-title fs-5"><a href="{% url 'recipe' recipe.id %}">{{ recipe.title }}</h5></a>
                                <p class="card-text">by {{ recipe.created_by }}</p>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <div class="my-3 text-center">
                    <h5>No recipes yet!</h5>
                </div>
            {% endif %}
        </div>    
    </div>
{% endblock %}
