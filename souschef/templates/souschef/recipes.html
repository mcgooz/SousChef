{% extends "SousChef/layout.html" %}
{% load static %}

{% block body %}
    <div class="container bg-custom mt-2 p-4">
        <div class="row">
            <h4>Recipes</h4>
        </div>

        <div class="row">
            {% if recipes %}
                <div id="scroller" class="scroller snap py-5">

                    {% for recipe in recipes %}
                        <div class="card recipe-card shadow mx-2" style="width: 18rem;">
                            {% if recipe.image %}
                                <a class="mt-3 mx-auto" href="{% url 'recipe' recipe.id %}">
                                <img src="{{ recipe.image.url }}" class="card-img-top img-fluid recipe-image-mid" alt="recipe image">
                                </a>
                            {% else %}
                                <a class="mt-3 mx-auto" href="{% url 'recipe' recipe.id %}">
                                <img src="{% static 'images/default_pics/default_recipe.png' %}" class="card-img-top img-fluid recipe-image-mid" alt="recipe image">
                                </a>
                            {% endif %}

                            <div class="card-body">
                                <h5 class="card-title"><a href="{% url 'recipe' recipe.id %}">{{ recipe.title }}</h5></a>
                                <p class="card-text">by {{ recipe.created_by }}</p>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <div class="my-3 text-center">
                    <h5>No recipes yet!</h5>
                </div>
            {% endif %}
        </div>

        <div class="row justify-content-end">
            <div class="col text-end">
                <svg id="scrollLeft" xmlns="http://www.w3.org/2000/svg" width="27" height="27" fill="currentColor" class="bi bi-caret-left btn-custom-icon" viewBox="0 0 16 16">
                    <path d="M10 12.796V3.204L4.519 8zm-.659.753-5.48-4.796a1 1 0 0 1 0-1.506l5.48-4.796A1 1 0 0 1 11 3.204v9.592a1 1 0 0 1-1.659.753"/>
                </svg>
                <svg id="scrollRight" xmlns="http://www.w3.org/2000/svg" width="27" height="27" fill="currentColor" class="bi bi-caret-right btn-custom-icon" viewBox="0 0 16 16">
                    <path d="M6 12.796V3.204L11.481 8zm.659.753 5.48-4.796a1 1 0 0 0 0-1.506L6.66 2.451C6.011 1.885 5 2.345 5 3.204v9.592a1 1 0 0 0 1.659.753"/>
                </svg>
            </div>
        </div>   
    </div>
{% endblock %}
