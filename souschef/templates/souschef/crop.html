{% extends "SousChef/layout.html" %}
{% load custom_filters %}
{% load static %}

{% block head %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
{% endblock %}

{% block body %}
<!-- Column 2 || Image -->
<div class="col">

            <h5>Image</h5>


        {% comment %} <div data-bs-toggle="modal" data-bs-target="#imageModal"></div> {% endcomment %}
        
        <img src="{% static 'images/recipe_pics/default_recipe.png' %}" alt="recipe image" id="imagePreview">

            <label for="imageUpload" class="mb-2 text-body-secondary fw-normal">Upload an image</label>
            {{ recipe_form.image }} <!-- ID: "imageUpload" -->

        <!-- Modal -->
        <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="modalLabel">Crop Image</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="modal-img-container">
                            <img id="image" src="" style="max-width: 100%;" alt="Image to Crop">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary">Save changes</button>
                    </div>
                </div>
            </div>
        </div>

</div>
{% endblock %}
